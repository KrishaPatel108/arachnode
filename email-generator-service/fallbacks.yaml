# fallbacks.yaml
# Static product observations grouped by company type.
# Used when Ollama is unavailable or times out.
# The generator selects the best-matching category from the job's stack/product tags.
# Add more entries freely — all are intentionally generic but technically credible.

fintech:
  keywords: [payment, payments, banking, finance, financial, lending, credit, insurance, wealth, neobank, razorpay, stripe, paytm, zerodha, cred, slice]
  observations:
