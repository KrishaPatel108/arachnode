    - "Making zero-downtime schema migrations predictable across large Postgres clusters is a problem that most teams work around rather than solve — it's impressive that you've built this into the platform."
    - "Your approach to control-plane/data-plane separation keeps operator complexity manageable as the system grows — a design discipline that's rare in open-source infra projects."

default:
  observations:
    - "The architecture decisions that go into keeping your platform reliable under real production load reflect the kind of engineering culture I'd be excited to contribute to."
