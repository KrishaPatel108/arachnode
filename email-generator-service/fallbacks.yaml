infra:
  keywords: [infrastructure, cloud, kubernetes, k8s, docker, devops, platform, networking, storage, database, postgres, kafka, redis, distributed, open source]
  observations:
    - "Building a distributed storage system that preserves strong consistency guarantees without sacrificing horizontal scalability is a fundamentally hard problem, and you've tackled it thoughtfully."
